# Site settings
title: "Bernat Font Garcia personal webpage"
description: "Bernat Font Garcia persona webpage"
url: "https://www.b-fg.github.io"
author:
  name: "Bernat Font Garcia"
  email: "b.fontgarcia@soton.ac.uk"
  url: "https://www.b-fg.github.io"

# Build settings
baseurl: / # Change this to your relative path (ex: /blog/), or leave just a /
markdown: kramdown
source: .
destination: ./_site
permalink: /:title
paginate: 8
paginate_path: /page:num/

# Default values
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Plugins
gems:
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
version: "1.0.0"

# Options
custom_header: True
custom_nav_footer: False
reverse: false
