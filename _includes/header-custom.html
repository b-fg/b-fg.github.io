<header id="header" class="parent justify-spaceBetween w100">
  <div class="inner w100 relative">
    <span class="f-left">  
      <a href="/">
        <h1><span>Bernat </span>Font</h1>
      </a>
    </span>
    <span id="nav-links" class="absolute right bottom">
      <!-- Nav pages -->
	    {% for page in site.pages %}
	      {% if page.layout == "page" %}
	        <a style="font-weight: 300; font-size: 16px"; href="{% if site.baseurl == "/" %}{{ page.url }}{% else %}{{ page.url | prepend: site.baseurl }}{% endif %}" title="{{ page.title }}">{{ page.title }}</a>
	      {% endif %}
	    {% endfor %}
      
      <!-- Nav links -->
	    {% include link.html %}

    </span>
  </div>
</header>
